name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug!

  - type: input
    id: environment
    attributes:
      label: Environment
      description: React Native version, platform, library version
      placeholder: "RN 0.73, Android 14, react-native-sherpa-onnx 0.3.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe the issue clearly
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the bug
      placeholder: |
        1. Install package
        2. Run example
        3. Crash occurs

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: Paste logs if available
      render: shell