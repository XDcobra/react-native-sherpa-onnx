# Collect ASR model archive structures from k2-fsa/sherpa-onnx asr-models release.
# For each .tar.bz2 asset: list contents with tar -tjf (no extraction).
# For each .onnx asset: record single-file entry.
# Creates or extends test/fixtures/asr-models-expected.csv (new assets get empty model_type).
# Results are cached per asset; aggregated output is written to test/fixtures and committed.

name: Testdata - Collect ASR model structures

on:
  workflow_dispatch:
    inputs:
      asset_limit:
        description: 'Max number of assets to process (0 or empty = no limit, process all)'
        required: false
        default: 0
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Restore latest cache (restore-keys matches any asr-models-trees-*). Save uses
      # job.check_run_id so each run has a unique key and never hits ReserveCacheError.
      # See https://github.com/gradle/actions/issues/722 and
      # https://github.com/orgs/community/discussions/8945#discussioncomment-14374985
      - name: Restore tree cache
        id: tree-cache
        uses: actions/cache/restore@v5
        with:
          path: tree-cache
          key: asr-models-trees-${{ job.check_run_id }}
          restore-keys: |
            asr-models-trees-
      - name: Log cache restore result
        run: |
          echo "cache-hit: ${{ steps.tree-cache.outputs.cache-hit }}"
          echo "tree-cache contents:"
          ls -la tree-cache 2>/dev/null || echo "(empty or missing)"

      - name: Get asset list (filter .tar.bz2 and .onnx, cap from input)
        id: assets
        env:
          ASSET_LIMIT: ${{ inputs.asset_limit }}
        run: |
          RESP=$(curl -sL "https://api.github.com/repos/k2-fsa/sherpa-onnx/releases/tags/asr-models")
          if echo "$RESP" | jq -e '.assets' >/dev/null 2>&1; then
            LIST=$(echo "$RESP" | jq -r '.assets[] | select(.name | endswith(".tar.bz2") or endswith(".onnx")) | "\(.name)|\(.browser_download_url)"')
            if [ -z "$ASSET_LIMIT" ] || [ "$ASSET_LIMIT" = "0" ]; then
              echo "$LIST" > asset-list.txt
              echo "No limit: processing all matching assets"
            else
              echo "$LIST" | head -n "$ASSET_LIMIT" > asset-list.txt
              echo "Limit: first $ASSET_LIMIT assets"
            fi
          else
            echo "::warning::Release asr-models not found or has no assets"
            touch asset-list.txt
          fi
          echo "count=$(wc -l < asset-list.txt)" >> $GITHUB_OUTPUT
          echo "Asset list:"
          cat asset-list.txt || true

      - name: Process each asset (download, list, cache, cleanup)
        run: |
          mkdir -p tree-cache work
          while IFS='|' read -r name url; do
            [ -z "$name" ] && continue
            # Safe filename for cache (no / or \)
            safe="${name//\//-}"
            safe="${safe//\\/-}"
            cache_file="tree-cache/${safe}.txt"
            if [ -f "$cache_file" ]; then
              echo "Skip (cached): $name"
              continue
            fi
            echo "Processing: $name"
            dl="work/${safe}"
            if ! curl -sSL -o "$dl" "$url"; then
              echo "::warning::Download failed for $name, skipping"
              rm -f "$dl"
              continue
            fi
            if [[ "$name" == *.tar.bz2 ]]; then
              if ! tar -tjf "$dl" > "$cache_file" 2>/dev/null; then
                echo "::warning::tar -tjf failed for $name, skipping"
                rm -f "$cache_file" "$dl"
                continue
              fi
            elif [[ "$name" == *.onnx ]]; then
              echo "single file: $name" > "$cache_file"
            else
              echo "::warning::Unexpected asset $name, skipping"
              rm -f "$dl"
              continue
            fi
            rm -f "$dl"
          done < asset-list.txt
          rm -rf work

      # Save with key unique to this job to avoid ReserveCacheError (another job may be
      # creating this cache). Restore uses restore-keys asr-models-trees- to load the latest.
      - name: Save tree cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: tree-cache
          key: asr-models-trees-${{ job.check_run_id }}

      - name: Build aggregated output file
        run: |
          mkdir -p test/fixtures
          out="test/fixtures/asr-models-structure.txt"
          : > "$out"
          while IFS='|' read -r name _; do
            [ -z "$name" ] && continue
            safe="${name//\//-}"
            safe="${safe//\\/-}"
            cache_file="tree-cache/${safe}.txt"
            [ -f "$cache_file" ] || continue
            echo "# Asset: $name" >> "$out"
            cat "$cache_file" >> "$out"
            echo "" >> "$out"
          done < asset-list.txt
          echo "Output preview:"
          head -80 "$out" || true

      - name: Create or extend CSV (add missing assets with empty model_type)
        run: |
          CSV="test/fixtures/asr-models-expected.csv"
          mkdir -p test/fixtures
          if [ ! -s asset-list.txt ]; then
            echo "No assets from release, skipping CSV update."
            exit 0
          fi
          if [ ! -f "$CSV" ]; then
            echo "asset_name,model_type" > "$CSV"
          fi
          # For each asset in asset-list (same set as structure file; respects asset_limit), ensure a row exists
          tmp=$(mktemp)
          echo "asset_name,model_type" > "$tmp"
          while IFS='|' read -r asset _; do
            [ -z "$asset" ] && continue
            esc="${asset//./\\.}"
            line=$(grep -E "^(\"${esc}\"|${esc})," "$CSV" 2>/dev/null | head -1)
            if [ -n "$line" ]; then
              echo "$line" >> "$tmp"
            else
              echo "${asset}," >> "$tmp"
            fi
          done < asset-list.txt
          mv "$tmp" "$CSV"
          echo "CSV updated (new assets get empty model_type):"
          wc -l "$CSV"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/fixtures/asr-models-structure.txt test/fixtures/asr-models-expected.csv
          git status --short
          # Only commit when our tracked files actually changed (ignore untracked asset-list.txt, tree-cache/)
          if ! git diff --staged --quiet; then
            git commit -m "chore(testdata): update ASR model structures and expected CSV from asr-models release"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit."
          fi
