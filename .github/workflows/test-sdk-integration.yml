name: Test SDK Integration (Fresh App)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'readme.md'
      - '**/README.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-integration
  cancel-in-progress: true

jobs:
  test-integration-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      JAVA_VERSION: '17'

    steps:
      - name: Checkout SDK
        uses: actions/checkout@v6
        with:
          path: react-native-sherpa-onnx
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: react-native-sherpa-onnx/.nvmrc

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          add-to-path: true
          local-cache: true

      - name: Start Local NPM Registry (Verdaccio)
        run: |
          npm install -g verdaccio wait-on --registry https://registry.npmjs.org/

          # Create htpasswd with ci-user (password: ci-password)
          PASS_HASH=$(echo -n "ci-password" | openssl dgst -sha1 -binary | openssl base64)
          echo "ci-user:{SHA}${PASS_HASH}" > ./htpasswd

          cat << 'CONF' > verdaccio-config.yaml
          storage: ./storage
          auth:
            htpasswd:
              file: ./htpasswd
              max_users: -1
          uplinks:
            npmjs:
              url: https://registry.npmjs.org/
          packages:
            '@*/*':
              access: $all
              publish: $authenticated
              proxy: npmjs
            '**':
              access: $all
              publish: $authenticated
              proxy: npmjs
          CONF

          verdaccio --config verdaccio-config.yaml --listen 4873 &
          wait-on http://localhost:4873/-/ping

          # Configure npm auth (base64 of ci-user:ci-password)
          AUTH_BASE64=$(echo -n 'ci-user:ci-password' | base64)
          cat > ~/.npmrc << NPMRC
          registry=http://localhost:4873/
          always-auth=true
          //localhost:4873/:_auth=${AUTH_BASE64}
          //localhost:4873/:email=ci@example.com
          NPMRC

          npm whoami --registry http://localhost:4873

      - name: Build and Publish SDK to Local Registry
        working-directory: react-native-sherpa-onnx
        run: |
          # Ensure registry and safe git directory are set inside this step
          npm config set registry http://localhost:4873/
          yarn config set registry http://localhost:4873/
          export NPM_CONFIG_REGISTRY=http://localhost:4873/
          git config --global --add safe.directory "$(pwd)"

          yarn install
          yarn prepare

          # Minor bump (e.g. 0.3.3 -> 0.4.0)
          yarn version minor --no-git-tag-version

          # Override publishConfig.registry so npm publish targets Verdaccio, not npmjs.org
          node -e "const p=require('./package.json'); p.publishConfig={registry:'http://localhost:4873/'}; require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"

          npm publish --registry http://localhost:4873

          npm view react-native-sherpa-onnx version --registry http://localhost:4873

      - name: Initialize Fresh React Native App
        run: |
          echo "y" | npx @react-native-community/cli@latest init TestProject --skip-install

      - name: Install Dependencies & SDK in TestProject
        working-directory: TestProject
        run: |
          npm config set registry http://localhost:4873/
          yarn config set registry http://localhost:4873/
          yarn install
          yarn add react-native-sherpa-onnx

      - name: Build Android App in TestProject
        working-directory: TestProject/android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/testproject-build-android.log
          GRADLE_EXIT=${PIPESTATUS[0]}
          if [ "$GRADLE_EXIT" -ne 0 ]; then
            echo "::error::Android Build Failed"
            exit "$GRADLE_EXIT"
          fi

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testproject-android-build-logs
          path: /tmp/testproject-build-android.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: testproject-release-apk
          path: TestProject/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
          if-no-files-found: error

  test-integration-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      XCODE_VERSION: 15.4

    steps:
      - name: Checkout SDK
        uses: actions/checkout@v6
        with:
          path: react-native-sherpa-onnx
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: react-native-sherpa-onnx/.nvmrc

      - name: Set up Ruby and Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler: 'default'

      - name: Start Local NPM Registry (Verdaccio)
        run: |
          npm install -g verdaccio wait-on --registry https://registry.npmjs.org/

          # Create htpasswd with ci-user (password: ci-password)
          PASS_HASH=$(echo -n "ci-password" | openssl dgst -sha1 -binary | openssl base64)
          echo "ci-user:{SHA}${PASS_HASH}" > ./htpasswd

          cat << 'CONF' > verdaccio-config.yaml
          storage: ./storage
          auth:
            htpasswd:
              file: ./htpasswd
              max_users: -1
          uplinks:
            npmjs:
              url: https://registry.npmjs.org/
          packages:
            '@*/*':
              access: $all
              publish: $authenticated
              proxy: npmjs
            '**':
              access: $all
              publish: $authenticated
              proxy: npmjs
          CONF

          verdaccio --config verdaccio-config.yaml --listen 4873 &
          wait-on http://localhost:4873/-/ping

          # Configure npm auth (base64 of ci-user:ci-password)
          AUTH_BASE64=$(echo -n 'ci-user:ci-password' | base64)
          cat > ~/.npmrc << NPMRC
          registry=http://localhost:4873/
          always-auth=true
          //localhost:4873/:_auth=${AUTH_BASE64}
          //localhost:4873/:email=ci@example.com
          NPMRC

          yarn config set registry http://localhost:4873/

          npm whoami --registry http://localhost:4873

      - name: Build and Publish SDK to Local Registry
        working-directory: react-native-sherpa-onnx
        run: |
          # Ensure registry and safe git directory are set inside this step
          npm config set registry http://localhost:4873/
          yarn config set registry http://localhost:4873/
          export NPM_CONFIG_REGISTRY=http://localhost:4873/
          git config --global --add safe.directory "$(pwd)"

          yarn install
          yarn prepare

          # Minor bump (e.g. 0.3.3 -> 0.4.0)
          yarn version minor --no-git-tag-version

          # Override publishConfig.registry so npm publish targets Verdaccio, not npmjs.org
          node -e "const p=require('./package.json'); p.publishConfig={registry:'http://localhost:4873/'}; require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"

          npm publish --registry http://localhost:4873

          npm view react-native-sherpa-onnx version --registry http://localhost:4873

      - name: Initialize Fresh React Native App
        run: |
          echo "y" | npx @react-native-community/cli@latest init TestProject --skip-install

      - name: Install Dependencies & SDK in TestProject
        working-directory: TestProject
        run: |
          npm config set registry http://localhost:4873/
          yarn config set registry http://localhost:4873/
          yarn install
          yarn add react-native-sherpa-onnx

      - name: Install iOS Pods
        working-directory: TestProject/ios
        run: |
          bundle install
          bundle exec pod install

      - name: Build iOS App in TestProject
        working-directory: TestProject/ios
        run: |
          set -o pipefail
          xcodebuild -workspace TestProject.xcworkspace \
            -scheme TestProject \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            clean build 2>&1 | tee /tmp/testproject-build-ios.log
          XCB_EXIT=${PIPESTATUS[0]}
          if [ "$XCB_EXIT" -ne 0 ]; then
            echo "::error::iOS Build Failed"
            exit "$XCB_EXIT"
          fi

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testproject-ios-build-logs
          path: /tmp/testproject-build-ios.log
