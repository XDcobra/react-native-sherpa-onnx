# ASR model detection tests: C++ tests that compare detector output with asr-models-expected.csv.
# Triggered on PR (via test-model-detect) or manually. Uses test/fixtures (asr-models-structure.txt, asr-models-expected.csv).

name: Test – ASR model detection

on:
  workflow_dispatch:
  workflow_call:

# Only one run per ref at a time; new pushes do not cancel in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  asr-model-detect:
    name: ASR model detection (C++)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libgtest-dev

      - name: Configure and build
        run: |
          mkdir -p test/cpp/build && cd test/cpp/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Run ASR model detection tests
        working-directory: ${{ github.workspace }}
        run: ./test/cpp/build/model_detect_test --gtest_filter=ModelDetectTest.FixturesExist:ModelDetectTest.DetectSttFromFileListMatchesExpected
